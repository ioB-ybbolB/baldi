<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Baldi's Basics</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:black;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#unityContainer{
  width:100vw;
  height:100vh;
}

#unityContainer canvas{
  width:100%;
  height:100%;
  display:block;
}
</style>

<script src="TemplateData/UnityProgress.js"></script>
<script src="Build/UnityLoader.js"></script>

<script>
async function loadAndMergeData() {
    const part1 = await fetch("Build/baldi webgl.data.unityweb.part1").then(r => r.arrayBuffer());
    const part2 = await fetch("Build/baldi webgl.data.unityweb.part2").then(r => r.arrayBuffer());
    const merged = new Uint8Array(part1.byteLength + part2.byteLength);
    merged.set(new Uint8Array(part1), 0);
    merged.set(new Uint8Array(part2), part1.byteLength);
    const dataBlobUrl = URL.createObjectURL(new Blob([merged]));
    const codeBlobUrl = await fetchAsBlobUrl("Build/baldi webgl.wasm.code.unityweb");
    const frameworkBlobUrl = await fetchAsBlobUrl("Build/baldi webgl.wasm.framework.unityweb");
    return { dataBlobUrl, codeBlobUrl, frameworkBlobUrl };
}

async function startUnity() {
    const blobs = await loadUnityBlobs();
    const json = await fetch("Build/baldi webgl.json").then(r => r.json());
    json.dataUrl = blobs.dataBlobUrl;
    json.wasmCodeUrl = blobs.codeBlobUrl;
    json.wasmFrameworkUrl = blobs.frameworkBlobUrl;
    UnityLoader.instantiate(
        "unityContainer",
        URL.createObjectURL(new Blob([JSON.stringify(json)]), {type:"application/json"}),
        { onProgress: UnityProgress }
    );
}

startUnity();
</script>
</head>

<body>
<div id="unityContainer"></div>
</body>
</html>
